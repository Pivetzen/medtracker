<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MedTracker Pro | Notificações</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --border: #e2e8f0;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 480px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo { text-align: center; font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 25px; }
        
        /* Botão de Ativação (Essencial para Safari/iOS) */
        #setup-notif {
            background: var(--warning); color: white; padding: 12px; border-radius: 12px; 
            margin-bottom: 20px; text-align: center; font-size: 0.85rem; font-weight: 700;
            cursor: pointer; display: none; border: none; width: 100%;
        }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; font-weight: 700; margin-bottom: 4px; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }

        .btn-add { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        .med-card { 
            background: #fff; border: 1px solid var(--border); padding: 18px; border-radius: 15px; margin-top: 15px;
            border-left: 6px solid var(--primary); position: relative; transition: all 0.3s;
        }
        .status-alert { 
            border-left-color: var(--danger); 
            background: #fff1f2; 
            animation: borderPulse 2s infinite;
        }

        @keyframes borderPulse {
            0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .med-name { font-weight: 800; font-size: 1.1rem; color: var(--text); }
        .med-info { font-size: 0.85rem; color: #64748b; margin: 5px 0; }
        
        .progress-container { background: #e2e8f0; height: 8px; border-radius: 4px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; transition: width 0.3s; }

        .timer { font-weight: 700; font-size: 0.9rem; margin-bottom: 12px; }
        .alert-text { color: var(--danger); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }

        .btn-take { width: 100%; padding: 12px; background: var(--success); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .delete-btn { position: absolute; top: 15px; right: 15px; color: #94a3b8; cursor: pointer; font-size: 0.8rem; border: none; background: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">💊 MedTracker</div>

    <button id="setup-notif" onclick="enableNotifications()">
        🔔 ATIVAR ALERTAS NO CELULAR
    </button>

    <div class="form-group">
        <label>Nome do Remédio</label>
        <input id="name" type="text" placeholder="Ex: Amoxicilina">
    </div>

    <div style="display: flex; gap: 10px;">
        <div class="form-group" style="flex: 1;">
            <label>Intervalo (Horas)</label>
            <input id="interval" type="number" placeholder="Ex: 8">
        </div>
        <div class="form-group" style="flex: 1;">
            <label>Duração (Dias)</label>
            <input id="days" type="number" placeholder="Ex: 7">
        </div>
    </div>

    <button class="btn-add" onclick="addMed()">Iniciar Tratamento</button>

    <div id="list"></div>
</div>

<script>
    let meds = JSON.parse(localStorage.getItem('meds_v3')) || [];

    // Mostra o botão se a permissão ainda não foi dada
    function checkNotificationStatus() {
        if ("Notification" in window) {
            if (Notification.permission !== "granted") {
                document.getElementById('setup-notif').style.display = 'block';
            } else {
                document.getElementById('setup-notif').style.display = 'none';
            }
        }
    }

    async function enableNotifications() {
        if ("Notification" in window) {
            const permission = await Notification.requestPermission();
            if (permission === "granted") {
                alert("Ótimo! Agora você receberá os alertas.");
                checkNotificationStatus();
            } else {
                alert("As notificações estão bloqueadas nas configurações do seu celular.");
            }
        }
    }

    function sendNotification(title, body) {
        if ("Notification" in window && Notification.permission === "granted") {
            try {
                new Notification(title, { 
                    body: body, 
                    icon: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
                    badge: 'https://cdn-icons-png.flaticon.com/512/822/822143.png'
                });
            } catch (e) {
                console.error("Erro ao disparar notificação:", e);
            }
        }
    }

    function save() {
        localStorage.setItem('meds_v3', JSON.stringify(meds));
        render();
    }

    function addMed() {
        const name = document.getElementById("name").value;
        const interval = parseFloat(document.getElementById("interval").value);
        const days = parseInt(document.getElementById("days").value);

        if (!name || !interval || !days) return alert("Preencha todos os campos!");

        const totalDoses = Math.ceil((days * 24) / interval);
        const newMed = {
            id: Date.now(),
            name,
            interval,
            totalDoses,
            dosesTaken: 0,
            last_taken: 0,
            notified: false
        };

        meds.push(newMed);
        save();
        document.getElementById("name").value = "";
        document.getElementById("interval").value = "";
        document.getElementById("days").value = "";
    }

    function takeMed(id) {
        const med = meds.find(m => m.id === id);
        if (med) {
            med.dosesTaken += 1;
            med.last_taken = Date.now();
            med.notified = false;
            
            if (med.dosesTaken >= med.totalDoses) {
                alert(`Tratamento de ${med.name} concluído!`);
                meds = meds.filter(m => m.id !== id);
            }
            save();
        }
    }

    function removeMed(id) {
        if(confirm("Remover este tratamento?")) {
            meds = meds.filter(m => m.id !== id);
            save();
        }
    }

function render() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        meds.forEach(med => {
            let timeText = "";
            let isOverdue = false;
            
            if (med.last_taken === 0) {
                timeText = "Aguardando 1ª dose";
                isOverdue = true;
            } else {
                const nextDose = med.last_taken + (med.interval * 3600000);
                const diff = nextDose - Date.now();
                
                if (diff <= 0) {
                    isOverdue = true;
                    timeText = "⚠️ HORA DE TOMAR!";
                    
                    // Dispara a notificação APENAS se ainda não avisou nesta dose
                    if (!med.notified) {
                        sendNotification("MedTracker", `Está na hora: ${med.name}`);
                        med.notified = true; 
                        localStorage.setItem('meds_v3', JSON.stringify(meds));
                    }
                } else {
                    const h = Math.floor(diff / 3600000);
                    const m = Math.floor((diff % 3600000) / 60000);
                    timeText = `Próxima em: ${h}h ${m}min`;
                }
            }

            const progress = (med.dosesTaken / med.totalDoses) * 100;
            const div = document.createElement("div");
            div.className = `med-card ${isOverdue ? 'status-alert' : ''}`;
            div.innerHTML = `
                <button class="delete-btn" onclick="removeMed(${med.id})">Excluir</button>
                <div class="med-name">${med.name}</div>
                <div class="med-info">Dose ${med.dosesTaken}/${med.totalDoses} • Cada ${med.interval}h</div>
                <div class="progress-container"><div class="progress-bar" style="width: ${progress}%"></div></div>
                <div class="timer ${isOverdue ? 'alert-text' : ''}">${timeText}</div>
                <button class="btn-take" onclick="takeMed(${med.id})">${med.last_taken === 0 ? 'Tomar 1ª Dose' : 'Registrar Dose'}</button>
            `;
            list.appendChild(div);
        });
    }

    // ATUALIZAÇÃO PARA 30 SEGUNDOS (30000 milissegundos)
    setInterval(render, 30000); 

    checkNotificationStatus();
    render();
</script>
</body>
</html>
