<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTracker | Cronograma Inteligente</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 5px; color: #64748b; }
        
        input { 
            width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 1rem; transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-add { 
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; 
            font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.1s, opacity 0.2s;
        }
        .btn-add:active { transform: scale(0.98); }

        h2 { font-size: 1.1rem; margin: 30px 0 15px; display: flex; justify-content: space-between; align-items: center; }

        .med-list { display: flex; flex-direction: column; gap: 15px; }
        
        .med-card { 
            background: #fff; border: 1px solid #e2e8f0; padding: 18px; border-radius: 15px; 
            position: relative; transition: all 0.3s ease;
        }
        
        .status-on-time { border-left: 6px solid var(--success); }
        .status-delayed { border-left: 6px solid var(--danger); background: #fff1f2; }

        .med-name { font-weight: 800; font-size: 1.1rem; display: block; margin-bottom: 4px; }
        .med-meta { font-size: 0.8rem; color: #64748b; margin-bottom: 12px; }

        .timer-box { font-size: 0.9rem; font-weight: 700; margin-bottom: 15px; }
        .time-remaining { color: var(--primary); }
        .time-overdue { color: var(--danger); animation: blink 1s infinite; }

        @keyframes blink { 50% { opacity: 0.6; } }

        .btn-take { 
            width: 100%; padding: 12px; background: var(--success); color: white; border: none; 
            border-radius: 10px; font-weight: 700; cursor: pointer;
        }

        .delete-link { 
            font-size: 0.75rem; color: #94a3b8; cursor: pointer; text-decoration: none; margin-top: 10px; display: inline-block;
        }
        .delete-link:hover { color: var(--danger); }

        .empty { text-align: center; color: #94a3b8; padding: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">💊 MedTracker</div>

    <div class="form-group">
        <label>Qual o remédio?</label>
        <input id="name" type="text" placeholder="Ex: Amoxicilina">
    </div>

    <div class="form-group">
        <label>De quantas em quantas horas?</label>
        <input id="interval" type="number" placeholder="Ex: 8">
    </div>

    <button class="btn-add" onclick="addMed()">Adicionar à Lista</button>

    <h2>Suas Medicações</h2>
    <div id="list" class="med-list"></div>
</div>

<script>
    let meds = JSON.parse(localStorage.getItem('meds_v2')) || [];

    function save() {
        localStorage.setItem('meds_v2', JSON.stringify(meds));
        render();
    }

    function addMed() {
        const nameInput = document.getElementById("name");
        const intervalInput = document.getElementById("interval");

        if (!nameInput.value || !intervalInput.value) return alert("Preencha tudo!");

        const newMed = {
            id: Date.now(),
            name: nameInput.value,
            interval: parseFloat(intervalInput.value),
            last_taken: Date.now() // Define que a primeira dose é agora
        };

        meds.push(newMed);
        nameInput.value = "";
        intervalInput.value = "";
        save();
    }

    function takeMed(id) {
        const index = meds.findIndex(m => m.id === id);
        if (index !== -1) {
            meds[index].last_taken = Date.now(); // Novo ciclo começa EXATAMENTE agora
            save();
        }
    }

    function removeMed(id) {
        if(confirm("Remover este medicamento?")) {
            meds = meds.filter(m => m.id !== id);
            save();
        }
    }

    function render() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        if (meds.length === 0) {
            list.innerHTML = '<div class="empty">Nenhum remédio cadastrado.</div>';
            return;
        }

        // Ordenar: os que precisam ser tomados logo aparecem primeiro
        meds.sort((a, b) => {
            let nextA = a.last_taken + (a.interval * 3600000);
            let nextB = b.last_taken + (b.interval * 3600000);
            return nextA - nextB;
        });

        meds.forEach(med => {
            const nextDose = med.last_taken + (med.interval * 3600000);
            const diff = nextDose - Date.now();
            const isOverdue = diff <= 0;

            const h = Math.abs(Math.floor(diff / 3600000));
            const m = Math.abs(Math.floor((diff % 3600000) / 60000));

            const li = document.createElement("div");
            li.className = `med-card ${isOverdue ? 'status-delayed' : 'status-on-time'}`;
            
            li.innerHTML = `
                <span class="med-name">${med.name}</span>
                <div class="med-meta">Intervalo de ${med.interval} em ${med.interval} horas</div>
                
                <div class="timer-box">
                    ${isOverdue 
                        ? `<span class="time-overdue">⚠️ Atrasado: ${h}h ${m}min</span>` 
                        : `Próxima dose em: <span class="time-remaining">${h}h ${m}min</span>`
                    }
                </div>

                <button class="btn-take" onclick="takeMed(${med.id})">
                    ${isOverdue ? 'Tomar Agora' : 'Marcar como Tomado'}
                </button>
                <a class="delete-link" onclick="removeMed(${med.id})">Remover medicamento</a>
            `;
            list.appendChild(li);
        });
    }

    // Atualiza a cada 30 segundos
    setInterval(render, 30000);
    render();
</script>

</body>
</html>
