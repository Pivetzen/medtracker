<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedTracker | Seu Controle de Saúde</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 20px; color: var(--primary); }
        
        .form-group { margin-bottom: 15px; }
        
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 5px; }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }

        h2 { font-size: 1.2rem; margin: 25px 0 15px; border-bottom: 2px solid var(--bg); padding-bottom: 5px; }

        ul { list-style: none; }

        li { 
            background: var(--bg); 
            margin-bottom: 12px; 
            padding: 15px; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column;
            position: relative;
            border-left: 5px solid var(--primary);
        }

        .med-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .med-name { font-weight: 700; font-size: 1.1rem; }
        
        .med-time { font-size: 0.85rem; color: var(--secondary); margin: 5px 0 12px; }

        .actions { display: flex; gap: 10px; }

        .btn-take { background: var(--success); padding: 8px; font-size: 0.85rem; margin-top: 0; }
        .btn-delete { background: transparent; color: var(--danger); width: auto; padding: 0; font-size: 0.8rem; text-decoration: underline; margin: 0; }

        .empty-state { text-align: center; color: var(--secondary); font-size: 0.9rem; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>💊 MedTracker</h1>

    <div class="form-group">
        <label>Nome do Medicamento</label>
        <input id="name" type="text" placeholder="Ex: Paracetamol">
    </div>

    <div class="form-group">
        <label>Intervalo (Horas)</label>
        <input id="interval" type="number" placeholder="Ex: 8">
    </div>

    <button onclick="addMed()">Adicionar à Lista</button>

    <h2>Minhas Medicações</h2>
    <ul id="list"></ul>
</div>

<script>
    // Inicialização do Banco de Dados Local
    let meds = JSON.parse(localStorage.getItem('meds_v1')) || [];

    function save() {
        localStorage.setItem('meds_v1', JSON.stringify(meds));
        render();
    }

    function addMed() {
        const nameInput = document.getElementById("name");
        const intervalInput = document.getElementById("interval");

        if (!nameInput.value || !intervalInput.value) {
            alert("Por favor, preencha o nome e o intervalo.");
            return;
        }

        const newMed = {
            id: Date.now(),
            name: nameInput.value,
            interval: parseFloat(intervalInput.value),
            last_taken: Date.now()
        };

        meds.push(newMed);
        nameInput.value = "";
        intervalInput.value = "";
        save();
    }

    function takeMed(id) {
        const index = meds.findIndex(m => m.id === id);
        if (index !== -1) {
            meds[index].last_taken = Date.now();
            save();
        }
    }

    function deleteMed(id) {
        if(confirm("Deseja remover este medicamento?")) {
            meds = meds.filter(m => m.id !== id);
            save();
        }
    }

    function render() {
        const list = document.getElementById("list");
        list.innerHTML = "";

        if (meds.length === 0) {
            list.innerHTML = '<p class="empty-state">Nenhum medicamento cadastrado.</p>';
            return;
        }

        meds.forEach(med => {
            const nextDose = med.last_taken + (med.interval * 3600000);
            const diff = nextDose - Date.now();
            
            let timeText = "";
            if (diff <= 0) {
                timeText = "⚠️ HORA DE TOMAR!";
            } else {
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                timeText = `Próxima dose em: ${h}h ${m}min`;
            }

            const li = document.createElement("li");
            li.innerHTML = `
                <div class="med-header">
                    <span class="med-name">${med.name}</span>
                    <button class="btn-delete" onclick="deleteMed(${med.id})">Remover</button>
                </div>
                <div class="med-time">${timeText} (A cada ${med.interval}h)</div>
                <button class="btn-take" onclick="takeMed(${med.id})">Registrar Dose Agora</button>
            `;
            list.appendChild(li);
        });
    }

    // Notificações (opcional)
    if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
    }

    // Atualizar interface a cada 1 minuto para o timer
    setInterval(render, 60000);

    // Primeira renderização
    render();
</script>

</body>
</html>
